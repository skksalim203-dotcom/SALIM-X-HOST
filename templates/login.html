<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SALIM PANEL - Login</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&family=Inter:wght@300;400;600;700&display=swap');
  
  * { margin:0; padding:0; box-sizing:border-box; }
  
  body {
    background: #0a0a0f;
    color: #e8e8f0;
    font-family: 'Inter', sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
  }
  
  /* Animated background */
  .bg-animation {
    position: fixed;
    inset: 0;
    z-index: 0;
    background: 
      radial-gradient(ellipse at 20% 50%, rgba(255,107,157,0.08) 0%, transparent 60%),
      radial-gradient(ellipse at 80% 50%, rgba(192,132,252,0.08) 0%, transparent 60%),
      radial-gradient(ellipse at 50% 100%, rgba(255,107,157,0.05) 0%, transparent 40%);
  }
  
  .bg-animation::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image: 
      linear-gradient(rgba(255,107,157,0.02) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,107,157,0.02) 1px, transparent 1px);
    background-size: 40px 40px;
    animation: gridMove 20s linear infinite;
  }
  
  @keyframes gridMove {
    from { transform: translateY(0); }
    to { transform: translateY(40px); }
  }
  
  /* Floating particles */
  .particles {
    position: fixed;
    inset: 0;
    z-index: 0;
    pointer-events: none;
    overflow: hidden;
  }
  
  .particle {
    position: absolute;
    width: 4px;
    height: 4px;
    background: rgba(255,107,157,0.3);
    border-radius: 50%;
    animation: float 15s infinite linear;
  }
  
  .particle:nth-child(1) { left: 10%; animation-duration: 12s; animation-delay: 0s; width: 6px; height: 6px; }
  .particle:nth-child(2) { left: 20%; animation-duration: 18s; animation-delay: 2s; }
  .particle:nth-child(3) { left: 30%; animation-duration: 14s; animation-delay: 4s; width: 8px; height: 8px; }
  .particle:nth-child(4) { left: 40%; animation-duration: 16s; animation-delay: 1s; }
  .particle:nth-child(5) { left: 50%; animation-duration: 13s; animation-delay: 3s; width: 5px; height: 5px; }
  .particle:nth-child(6) { left: 60%; animation-duration: 19s; animation-delay: 5s; }
  .particle:nth-child(7) { left: 70%; animation-duration: 15s; animation-delay: 2s; width: 7px; height: 7px; }
  .particle:nth-child(8) { left: 80%; animation-duration: 17s; animation-delay: 4s; }
  .particle:nth-child(9) { left: 90%; animation-duration: 11s; animation-delay: 1s; width: 6px; height: 6px; }
  .particle:nth-child(10) { left: 95%; animation-duration: 14s; animation-delay: 3s; }
  
  @keyframes float {
    0% { transform: translateY(100vh) scale(0); opacity: 0; }
    10% { opacity: 1; }
    90% { opacity: 1; }
    100% { transform: translateY(-10vh) scale(1); opacity: 0; }
  }
  
  /* Glow lines */
  .glow-lines {
    position: fixed;
    inset: 0;
    z-index: 0;
    pointer-events: none;
    overflow: hidden;
  }
  
  .glow-line {
    position: absolute;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(255,107,157,0.2), transparent);
    animation: lineMove 8s infinite linear;
  }
  
  .glow-line:nth-child(1) { top: 20%; width: 80%; left: 10%; animation-delay: 0s; }
  .glow-line:nth-child(2) { top: 50%; width: 60%; left: 20%; animation-delay: 3s; }
  .glow-line:nth-child(3) { top: 80%; width: 70%; left: 15%; animation-delay: 6s; }
  
  @keyframes lineMove {
    0% { transform: translateX(-100%); opacity: 0; }
    50% { opacity: 1; }
    100% { transform: translateX(100%); opacity: 0; }
  }
  
  .login-container {
    position: relative;
    z-index: 1;
    background: rgba(20,20,31,0.92);
    border: 1px solid rgba(255,107,157,0.15);
    border-radius: 28px;
    padding: 50px 45px;
    width: 100%;
    max-width: 420px;
    backdrop-filter: blur(20px);
    box-shadow: 
      0 0 80px rgba(255,107,157,0.05),
      0 0 0 1px rgba(255,107,157,0.05),
      inset 0 1px 0 rgba(255,255,255,0.05);
    animation: containerIn 0.8s ease;
  }
  
  @keyframes containerIn {
    from { opacity: 0; transform: translateY(-30px) scale(0.95); }
    to { opacity: 1; transform: translateY(0) scale(1); }
  }
  
  .logo {
    text-align: center;
    margin-bottom: 40px;
  }
  
  .logo-icon {
    font-size: 56px;
    display: block;
    margin-bottom: 12px;
    animation: iconGlow 3s ease-in-out infinite;
    filter: drop-shadow(0 0 30px rgba(255,107,157,0.3));
  }
  
  @keyframes iconGlow {
    0%, 100% { filter: drop-shadow(0 0 20px rgba(255,107,157,0.3)); }
    50% { filter: drop-shadow(0 0 50px rgba(255,107,157,0.6)); }
  }
  
  .logo-text {
    font-family: 'Orbitron', sans-serif;
    font-size: 28px;
    font-weight: 900;
    background: linear-gradient(135deg, #ff6b9d, #c084fc, #ff6b9d);
    background-size: 200% 200%;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    animation: gradientShift 4s ease-in-out infinite;
    letter-spacing: 4px;
  }
  
  @keyframes gradientShift {
    0%, 100% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
  }
  
  .logo-sub {
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    color: #8888aa;
    margin-top: 6px;
    letter-spacing: 6px;
    text-transform: uppercase;
  }
  
  .input-group {
    margin-bottom: 18px;
  }
  
  .input-label {
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    color: #8888aa;
    letter-spacing: 2px;
    display: block;
    margin-bottom: 6px;
    text-transform: uppercase;
  }
  
  .input-field {
    width: 100%;
    padding: 14px 18px;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,107,157,0.12);
    border-radius: 12px;
    color: #e8e8f0;
    font-size: 14px;
    font-family: 'Inter', sans-serif;
    transition: all 0.3s;
  }
  
  .input-field:focus {
    border-color: #ff6b9d;
    outline: none;
    box-shadow: 0 0 30px rgba(255,107,157,0.08), inset 0 0 30px rgba(255,107,157,0.03);
    background: rgba(255,255,255,0.06);
  }
  
  .input-field::placeholder {
    color: #555577;
  }
  
  .btn {
    width: 100%;
    padding: 16px;
    border: none;
    border-radius: 12px;
    font-family: 'Orbitron', sans-serif;
    font-weight: 700;
    font-size: 13px;
    letter-spacing: 3px;
    cursor: pointer;
    transition: all 0.3s;
    margin-top: 8px;
    text-transform: uppercase;
    position: relative;
    overflow: hidden;
  }
  
  .btn-primary {
    background: linear-gradient(135deg, #ff6b9d, #c084fc);
    color: #0a0a0f;
    box-shadow: 0 0 40px rgba(255,107,157,0.15);
  }
  
  .btn-primary:hover {
    transform: translateY(-2px);
    box-shadow: 0 0 60px rgba(255,107,157,0.25);
  }
  
  .btn-primary:active {
    transform: translateY(0);
  }
  
  .btn-primary::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, transparent 40%, rgba(255,255,255,0.1) 50%, transparent 60%);
    transform: translateX(-100%);
    transition: transform 0.6s;
  }
  
  .btn-primary:hover::after {
    transform: translateX(100%);
  }
  
  .status-dot {
    display: inline-block;
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: #34d399;
    box-shadow: 0 0 15px #34d399;
    animation: pulse 1.5s ease-in-out infinite;
    margin-right: 8px;
  }
  
  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.5; transform: scale(1.3); }
  }
  
  .server-status {
    text-align: center;
    margin-top: 28px;
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    color: #34d399;
    letter-spacing: 2px;
    padding-top: 20px;
    border-top: 1px solid rgba(255,255,255,0.04);
  }
  
  .error-msg {
    color: #f87171;
    font-family: 'Share Tech Mono', monospace;
    font-size: 12px;
    text-align: center;
    margin-bottom: 14px;
    min-height: 20px;
    opacity: 0;
    transition: opacity 0.3s;
  }
  
  .error-msg.show {
    opacity: 1;
  }
  
  .security-badge {
    text-align: center;
    margin-top: 16px;
    font-family: 'Share Tech Mono', monospace;
    font-size: 9px;
    color: #555577;
    letter-spacing: 2px;
  }
  
  .security-badge span {
    color: #ff6b9d;
  }
  
  @media (max-width: 480px) {
    .login-container { padding: 30px 20px; }
    .logo-text { font-size: 22px; }
  }
</style>
</head>
<body>

<div class="bg-animation"></div>

<div class="particles">
  <div class="particle"></div>
  <div class="particle"></div>
  <div class="particle"></div>
  <div class="particle"></div>
  <div class="particle"></div>
  <div class="particle"></div>
  <div class="particle"></div>
  <div class="particle"></div>
  <div class="particle"></div>
  <div class="particle"></div>
</div>

<div class="glow-lines">
  <div class="glow-line"></div>
  <div class="glow-line"></div>
  <div class="glow-line"></div>
</div>

<div class="login-container">
  <div class="logo">
    <span class="logo-icon">👑</span>
    <div class="logo-text">SALIM PANEL</div>
    <div class="logo-sub">Premium Hosting</div>
  </div>
  
  <div id="loginForm">
    <div class="error-msg" id="loginError"></div>
    <div class="input-group">
      <label class="input-label">Username</label>
      <input class="input-field" id="loginUsername" placeholder="Enter username" autocomplete="username">
    </div>
    <div class="input-group">
      <label class="input-label">Password</label>
      <input class="input-field" id="loginPassword" type="password" placeholder="Enter password" autocomplete="current-password">
    </div>
    <button class="btn btn-primary" onclick="handleLogin()">▶ Authenticate</button>
  </div>
  
  <div class="server-status">
    <span class="status-dot"></span> SERVER ONLINE · 24/7
  </div>
  
  <div class="security-badge">
    ⚠️ <span>UNAUTHORIZED ACCESS PROHIBITED</span> · SECURE SYSTEMS ⚠️
  </div>
</div>

<script>
async function handleLogin() {
  const username = document.getElementById('loginUsername').value.trim();
  const password = document.getElementById('loginPassword').value;
  const errorEl = document.getElementById('loginError');
  
  errorEl.textContent = '';
  errorEl.classList.remove('show');
  
  if (!username || !password) {
    errorEl.textContent = '⚠️ Please enter username and password';
    errorEl.classList.add('show');
    return;
  }
  
  try {
    const res = await fetch('/api/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username, password })
    });
    
    const data = await res.json();
    if (data.success) {
      window.location.href = '/';
    } else {
      errorEl.textContent = '❌ ' + (data.error || 'Login failed');
      errorEl.classList.add('show');
      document.getElementById('loginPassword').style.borderColor = '#f87171';
      setTimeout(() => {
        document.getElementById('loginPassword').style.borderColor = '';
      }, 1000);
    }
  } catch (e) {
    errorEl.textContent = '🌐 Network error. Please try again.';
    errorEl.classList.add('show');
  }
}

document.addEventListener('keydown', (e) => {
  if (e.key === 'Enter') {
    handleLogin();
  }
});

document.querySelectorAll('.input-field').forEach(input => {
  input.addEventListener('focus', function() {
    this.parentElement.querySelector('.input-label').style.color = '#ff6b9d';
  });
  input.addEventListener('blur', function() {
    this.parentElement.querySelector('.input-label').style.color = '';
  });
});
</script>
</body>
</html>
